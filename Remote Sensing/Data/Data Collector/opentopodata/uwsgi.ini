[uwsgi]
strict = true
need-app = true

http-socket = :9090
vacuum = true
uid = www-data
gid = www-data

master = true

chdir = /home/opentopodata
pythonpath = /home/opentopodata
wsgi-file = /home/opentopodata/opentopodata/api.py
callable = app
manage-script-name = true

die-on-term = true

buffer-size = 65535